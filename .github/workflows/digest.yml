name: Weekly digest

on:
  schedule:
    - cron: '0 8 * * 1'       # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write              # commit state.json
  discussions: write           # create Announcement
  models: read                 # GitHub Models API (free)

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Run digest
        run: python script/digest.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Commit state
        run: |
          git config user.name "feeds-bot"
          git config user.email "feeds-bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || (git commit -m "update state" && git push)
